<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Acot — Beauty Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.383.0/umd/lucide.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#F8F6F1;}
button{font-family:'DM Sans',sans-serif;cursor:pointer;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:#9BAA9B;border-radius:10px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scanLine{0%{top:8%}100%{top:88%}}
@keyframes floatDrop{0%,100%{transform:translateY(0);opacity:.5}50%{transform:translateY(-9px);opacity:.9}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes orb{0%,100%{transform:translate(0,0)}40%{transform:translate(28px,-18px)}70%{transform:translate(-12px,22px)}}
.lift{transition:transform .25s,box-shadow .25s;}
.lift:hover{transform:translateY(-4px)!important;box-shadow:0 14px 44px rgba(0,0,0,.09)!important;}
.rowHov{transition:background .2s;}
.rowHov:hover{background:#F2F0EB!important;}
.navBtn{transition:all .2s;}
.navBtn:hover{color:#7A6878!important;background:#F0ECF8!important;}
.tabBtn:hover{background:#F2F0EB!important;}
.fade-up{animation:fadeUp .7s ease both;}
.section{display:none;}
.section.active{display:block;}
</style>
</head>
<body>

<!-- APP -->
<div id="app" style="min-height:100vh;background:#F8F6F1;">

  <!-- HEADER -->
  <header style="position:sticky;top:0;z-index:200;height:60px;background:rgba(248,246,241,0.93);backdrop-filter:blur(18px);border-bottom:0.5px solid #E0DDD6;display:flex;align-items:center;justify-content:space-between;padding:0 28px;">
    <button onclick="showTab('home')" style="background:none;border:none;cursor:pointer;display:flex;flex-direction:column;line-height:1;align-items:flex-start;">
      <span style="font-family:'Cormorant Garamond',Georgia,serif;font-size:24px;font-weight:300;color:#7A6878;font-style:italic;letter-spacing:0.05em;">Acot</span>
      <span style="font-size:7px;letter-spacing:0.3em;color:#9BAA9B;margin-top:-3px;">BEAUTY INTELLIGENCE</span>
    </button>
    <nav style="display:flex;" id="main-nav">
      <button onclick="showTab('home')" class="navBtn" data-tab="home" style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:0 11px;height:60px;background:transparent;border:none;border-bottom:2px solid #A899C0;color:#7A6878;min-width:54px;">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span style="font-size:8px;letter-spacing:0.07em;font-weight:500;">HOME</span>
      </button>
      <button onclick="showTab('skin')" class="navBtn" data-tab="skin" style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:0 11px;height:60px;background:transparent;border:none;border-bottom:2px solid transparent;color:#777770;min-width:54px;">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M12 2a10 10 0 0 1 10 10c0 5.52-4.48 10-10 10S2 17.52 2 12 6.48 2 12 2z"/><path d="M12 8v4l3 3"/></svg>
        <span style="font-size:8px;letter-spacing:0.07em;">肌診断</span>
      </button>
      <button onclick="showTab('scanner')" class="navBtn" data-tab="scanner" style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:0 11px;height:60px;background:transparent;border:none;border-bottom:2px solid transparent;color:#777770;min-width:54px;">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><line x1="7" y1="12" x2="17" y2="12"/></svg>
        <span style="font-size:8px;letter-spacing:0.07em;">成分解析</span>
      </button>
      <button onclick="showTab('cabinet')" class="navBtn" data-tab="cabinet" style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:0 11px;height:60px;background:transparent;border:none;border-bottom:2px solid transparent;color:#777770;min-width:54px;">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/></svg>
        <span style="font-size:8px;letter-spacing:0.07em;">マイ棚</span>
      </button>
      <button onclick="showTab('editorial')" class="navBtn" data-tab="editorial" style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:0 11px;height:60px;background:transparent;border:none;border-bottom:2px solid transparent;color:#777770;min-width:54px;">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        <span style="font-size:8px;letter-spacing:0.07em;">情報誌</span>
      </button>
      <button onclick="showTab('color')" class="navBtn" data-tab="color" style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:0 11px;height:60px;background:transparent;border:none;border-bottom:2px solid transparent;color:#777770;min-width:54px;">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></svg>
        <span style="font-size:8px;letter-spacing:0.07em;">カラー</span>
      </button>
      <button onclick="showTab('academy')" class="navBtn" data-tab="academy" style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:0 11px;height:60px;background:transparent;border:none;border-bottom:2px solid transparent;color:#777770;min-width:54px;">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
        <span style="font-size:8px;letter-spacing:0.07em;">レッスン</span>
      </button>
    </nav>
    <button style="width:50px;height:50px;border-radius:50%;background:#C4B8D4;color:#7A6878;border:none;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:7px;letter-spacing:0.14em;gap:3px;">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      RESERVE
    </button>
  </header>

  <main id="main-content"></main>

  <footer style="border-top:0.5px solid #E0DDD6;padding:18px 60px;background:#fff;display:flex;justify-content:space-between;align-items:center;">
    <span style="font-family:'Cormorant Garamond',Georgia,serif;font-size:18px;font-weight:300;color:#7A6878;font-style:italic;">Acot</span>
    <span style="font-size:9px;color:#9BAA9B;letter-spacing:0.2em;">© 2025 ACOT BEAUTY INTELLIGENCE</span>
  </footer>
</div>

<script>
// ── COLORS ──
const C = {
  bg:"#F8F6F1",white:"#FFFFFF",moss:"#6B7B6B",mossLight:"#A8BBA8",mossDark:"#8FAF8F",
  mossUltra:"#E4EBE4",charcoal:"#7A6878",gray:"#9A9490",grayLight:"#E0DDD6",
  grayUltra:"#F2F0EB",cream:"#F5F0E8",gold:"#D4B87A",goldLight:"#F5ECD0",
  rose:"#C49B9B",roseLight:"#F0E4E4",ink:"#F0ECF8",
};

// ── STATE ──
let currentTab = 'home';
let cabinet = [];
let skinPhase = 'idle', skinRes = null, skinAnim = false;
let scannerPhase = 'idle', scannerProd = null, scannerSaved = false, scannerAct = null;
let colorPhase = 'idle', colorRes = null;
let academyCat = 'makeup', academyLv = 'beginner';

// ── HELPERS ──
function pill(text, color=C.moss, bg=C.mossUltra){
  return `<span style="display:inline-block;padding:3px 13px;border-radius:20px;background:${bg};color:${color};font-size:9px;letter-spacing:0.18em;text-transform:uppercase;font-weight:500;">${text}</span>`;
}
function waterDrops(n=20,op=0.1,light=false){
  let h='<div style="position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:0;">';
  for(let i=0;i<n;i++){
    const x=(i*41+13)%100,y=(i*57+9)%100,s=2.5+(i%5)*1.6,d=(i*0.38)%3.2,dur=3+(i%4);
    const col=light?`rgba(255,255,255,${op*2.2})`:`rgba(107,123,107,${op})`;
    const brd=light?`rgba(255,255,255,${op*3})`:`rgba(107,123,107,${op*1.4})`;
    h+=`<div style="position:absolute;left:${x}%;top:${y}%;width:${s}px;height:${s*1.35}px;border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;background:${col};border:0.5px solid ${brd};animation:floatDrop ${dur}s ease-in-out ${d}s infinite;"></div>`;
  }
  return h+'</div>';
}
function orbs(c1=C.mossUltra,c2=C.goldLight,c3=C.roseLight){
  return `<div style="position:absolute;inset:0;overflow:hidden;pointer-events:none;">
    <div style="position:absolute;top:-20%;left:-10%;width:55%;height:55%;border-radius:50%;background:${c1};opacity:0.6;filter:blur(64px);animation:orb 13s ease-in-out infinite;"></div>
    <div style="position:absolute;bottom:-15%;right:-8%;width:45%;height:45%;border-radius:50%;background:${c2};opacity:0.45;filter:blur(80px);animation:orb 17s ease-in-out 4s infinite;"></div>
    <div style="position:absolute;top:38%;right:18%;width:32%;height:32%;border-radius:50%;background:${c3};opacity:0.35;filter:blur(52px);animation:orb 11s ease-in-out 2s infinite;"></div>
  </div>`;
}
function sectionHead(pillTxt,title,pillColor=C.moss,pillBg='rgba(107,123,107,0.2)',bg=C.mossUltra){
  return `<div style="background:${bg};border-bottom:0.5px solid ${C.grayLight};padding:28px 60px 24px;position:relative;overflow:hidden;">
    ${waterDrops(12,0.07)}
    <div style="position:relative;">${pill(pillTxt,pillColor,pillBg)}<h2 style="font-family:'Cormorant Garamond',Georgia,serif;font-size:40px;font-weight:400;color:${C.charcoal};margin-top:10px;">${title}</h2></div>
  </div>`;
}
function checkIcon(color,size=9){
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`;
}
function arrowRight(size=13,color='#fff'){
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>`;
}

// ── FEATURES DATA ──
const FEAT = [
  {id:"skin",title:"肌診断",sub:"Skin Analysis",desc:"AIがあなたの肌状態をリアルタイム解析。水分・油分・キメ・赤みを数値化し、あなただけのスキンケアを提案します。",points:["水分・油分・キメを定量スコア化","赤みや敏感度の可視化","肌タイプ別ケアルーティン提案"],btn:"今すぐ診断",acc:C.moss,bg:C.mossUltra,
    icon:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M12 2a10 10 0 0 1 10 10c0 5.52-4.48 10-10 10S2 17.52 2 12 6.48 2 12 2z"/><path d="M6.3 15a6 6 0 1 0 11.4 0"/></svg>`},
  {id:"scanner",title:"成分解析",sub:"Cosme Scanner",desc:"コスメのラベルをスキャンするだけで全成分を即座に解析。注目成分の効能・注意点をわかりやすく解説します。",points:["500種以上の成分データベース","刺激成分・アレルゲンの自動検出","相性の良い成分の組み合わせ提案"],btn:"スキャンする",acc:C.gold,bg:C.goldLight,
    icon:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2V9M9 21H5a2 2 0 0 1-2-2V9m0 0h18"/></svg>`},
  {id:"cabinet",title:"マイドレッサー",sub:"My Cabinet",desc:"スキャンしたコスメをデジタルコレクションとして管理。使用期限・相性・重複成分を一覧で確認できます。",points:["コスメをまとめて一元管理","使用期限アラート","成分の重複・相性チェック"],btn:"棚を見る",acc:C.rose,bg:C.roseLight,
    icon:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>`},
  {id:"editorial",title:"美容情報誌",sub:"Editorial",desc:"皮膚科学を基盤にした信頼性の高い美容情報を、雑誌のようなリッチなレイアウトで。トレンドから基礎知識まで。",points:["科学的根拠に基づいた記事","最新トレンドをいち早くキャッチ","スキンケア・メイクの深掘り解説"],btn:"読んでみる",acc:C.mossDark,bg:C.cream,
    icon:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>`},
  {id:"color",title:"カラー診断",sub:"Color Palette",desc:"写真一枚で春夏秋冬4シーズンを自動判定。あなたのパーソナルカラーに合ったコスメカラーを提案します。",points:["4シーズン自動判定（Spring/Summer/Autumn/Winter）","似合うリップ・アイシャドウカラー一覧","NGカラーの理由も丁寧に解説"],btn:"診断を始める",acc:"#9B8CC4",bg:"#EDE8F5",
    icon:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></svg>`},
  {id:"academy",title:"レッスン動画",sub:"Academy",desc:"プロのメイクアップアーティストが監修した動画レッスン。初級から上級まで、あなたのレベルに合わせて学べます。",points:["メイク・ヘアをレベル別に選択","プロ監修の実践的テクニック","人気動画のランキング＆トレンド"],btn:"レッスンを見る",acc:"#C4866B",bg:"#F5EAE4",
    icon:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>`},
];

const MQ = ["Skin Analysis","Cosme Scanner","My Cabinet","Editorial","Color Palette","Beauty Academy","Skin Analysis","Cosme Scanner","My Cabinet","Editorial","Color Palette","Beauty Academy"];

// ── HOME ──
function renderHome(){
  const featureCards = FEAT.map((f,i)=>`
    <div class="lift" style="background:#fff;border:0.5px solid ${C.grayLight};border-radius:2px;cursor:pointer;position:relative;overflow:hidden;animation:fadeUp .7s ${i*0.08}s ease both;display:flex;flex-direction:column;">
      <div style="position:absolute;top:0;left:0;right:0;height:2px;background:${f.acc};"></div>
      <div style="padding:28px 26px 20px;flex:1;">
        <div style="display:flex;align-items:flex-start;gap:14px;margin-bottom:16px;">
          <div style="width:48px;height:48px;border-radius:50%;background:${f.bg};display:flex;align-items:center;justify-content:center;flex-shrink:0;color:${f.acc};">${f.icon}</div>
          <div>
            <p style="font-family:'Cormorant Garamond',Georgia,serif;font-size:22px;font-weight:400;color:${C.charcoal};margin-bottom:2px;line-height:1.1;">${f.title}</p>
            <p style="font-size:8px;letter-spacing:0.2em;text-transform:uppercase;color:${f.acc};">${f.sub}</p>
          </div>
        </div>
        <p style="font-size:12px;color:${C.gray};line-height:1.9;margin-bottom:18px;font-weight:300;">${f.desc}</p>
        <div style="display:flex;flex-direction:column;gap:7px;">
          ${f.points.map(pt=>`
            <div style="display:flex;align-items:flex-start;gap:8px;">
              <div style="width:15px;height:15px;border-radius:50%;background:${f.bg};display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;">${checkIcon(f.acc)}</div>
              <span style="font-size:11px;color:${C.gray};line-height:1.6;font-weight:300;">${pt}</span>
            </div>`).join('')}
        </div>
      </div>
      <div style="padding:16px 26px 22px;border-top:0.5px solid ${C.grayLight};">
        <button onclick="showTab('${f.id}')" style="width:100%;padding:11px 0;border-radius:2px;background:${f.acc};color:#fff;border:none;font-size:12px;letter-spacing:0.1em;display:flex;align-items:center;justify-content:center;gap:8px;"
          onmouseover="this.style.opacity='.82'" onmouseout="this.style.opacity='1'">
          ${f.btn} ${arrowRight(13)}
        </button>
      </div>
    </div>`).join('');

  const marqueeItems = MQ.map(t=>`<span style="font-size:9px;letter-spacing:0.3em;text-transform:uppercase;color:rgba(80,60,100,0.8);padding:0 30px;">${t} <span style="color:rgba(100,80,120,0.35);margin:0 6px;">◆</span></span>`).join('');

  return `
  <div style="background:${C.bg};">
    <!-- HERO -->
    <section style="position:relative;min-height:88vh;display:flex;align-items:center;overflow:hidden;background:${C.ink};">
      ${orbs('#C8DECB','#EDE0C4','#E8E0F4')}
      ${waterDrops(32,0.07,true)}
      <div style="position:absolute;top:0;left:50%;width:0.5px;height:100%;background:rgba(163,184,163,0.15);"></div>
      <div style="position:absolute;top:32%;left:0;right:0;height:0.5px;background:rgba(163,184,163,0.15);"></div>
      <div style="position:relative;z-index:1;padding:80px 60px;width:100%;max-width:1060px;margin:0 auto;animation:fadeUp .9s ease both;">
        ${pill('Beauty Intelligence Platform',C.mossLight,'rgba(107,123,107,0.18)')}
        <div style="margin-top:32px;">
          <h1 style="font-family:'Cormorant Garamond',Georgia,serif;font-size:clamp(54px,8vw,102px);font-weight:400;color:#5A4E68;line-height:0.93;letter-spacing:-0.01em;">
            <em style="display:block;font-style:italic;color:${C.mossLight};font-size:0.52em;letter-spacing:0.03em;">Discover</em>
            Your Beauty
            <span style="display:block;color:${C.gold};font-style:italic;">Intelligence</span>
          </h1>
        </div>
        <div style="margin-top:34px;max-width:460px;">

const LC={beginner:{acc:C.moss,bg:C.mossUltra},intermediate:{acc:C.gold,bg:C.goldLight},advanced:{acc:C.rose,bg:C.roseLight}};

function renderAcademy(){
  const lc=LC[academyLv];
  const cur=LS[academyCat][academyLv];
  return `
    <div style="min-height:calc(100vh - 60px);background:${C.bg};">
      <div style="background:#F5EAE4;border-bottom:0.5px solid ${C.grayLight};padding:0 60px;position:relative;overflow:hidden;">
        ${waterDrops(10,0.07)}
        <div style="position:relative;padding-top:28px;">
          ${pill('Beauty Academy','#C4866B','rgba(196,134,107,0.2)')}
          <h2 style="font-family:'Cormorant Garamond',Georgia,serif;font-size:40px;font-weight:400;color:${C.charcoal};margin:10px 0 26px;">レベル別レッスン</h2>
          <div style="display:flex;">
            ${[["makeup","メイクアップ"],["hair","ヘアセット"]].map(([id,lb])=>`
              <button onclick="academyCat='${id}';renderTab()" class="tabBtn" style="padding:12px 30px;background:transparent;border:none;font-size:13px;color:${academyCat===id?'#7A6878':C.gray};border-bottom:2px solid ${academyCat===id?'#A899C0':'transparent'};transition:all .2s;">${lb}</button>`).join('')}
          </div>
        </div>
      </div>
      <div style="padding:32px 60px;max-width:940px;margin:0 auto;">
        <div style="display:flex;gap:8px;margin-bottom:30px;">
          ${[["beginner","初級"],["intermediate","中級"],["advanced","上級"]].map(([l,lb])=>`
            <button onclick="academyLv='${l}';renderTab()" style="padding:8px 24px;border-radius:24px;background:${academyLv===l?LC[l].acc:'transparent'};color:${academyLv===l?'#fff':C.gray};border:0.5px solid ${academyLv===l?LC[l].acc:C.grayLight};font-size:12px;letter-spacing:0.08em;transition:all .2s;">${lb}</button>`).join('')}
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(252px,1fr));gap:16px;">
          ${cur.map((lesson,i)=>`
            <div class="lift" style="background:#fff;border:0.5px solid ${C.grayLight};border-radius:2px;overflow:hidden;cursor:pointer;animation:fadeUp .6s ${i*0.08}s ease both;">
              <div style="aspect-ratio:16/9;background:${C.grayUltra};position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;">
                ${waterDrops(7,0.07)}
                <div style="width:44px;height:44px;border-radius:50%;background:${C.charcoal};display:flex;align-items:center;justify-content:center;z-index:1;">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="#fff" stroke="none"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                </div>
                <div style="position:absolute;bottom:10px;right:10px;background:rgba(0,0,0,0.62);color:#fff;font-size:10px;padding:2px 8px;border-radius:3px;z-index:1;">${lesson.d}</div>
                <div style="position:absolute;top:10px;left:10px;z-index:1;">${pill(lesson.tag,lc.acc,lc.bg)}</div>
              </div>
              <div style="padding:15px 16px;">
                <p style="font-size:13px;color:${C.charcoal};line-height:1.55;margin-bottom:9px;">${lesson.t}</p>
                <div style="display:flex;align-items:center;gap:5px;">
                  <svg width="10" height="10" viewBox="0 0 24 24" fill="${C.gold}" stroke="${C.gold}" stroke-width="1"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                  <span style="font-size:10px;color:${C.mossLight};">${lesson.v} 再生</span>
                </div>
              </div>
            </div>`).join('')}
        </div>
      </div>
    </div>`;
}

// ── TAB ROUTER ──
function renderTab(){
  const main = document.getElementById('main-content');
  switch(currentTab){
    case 'home': main.innerHTML=renderHome(); break;
    case 'skin': main.innerHTML=renderSkin(); break;
    case 'scanner': main.innerHTML=renderScanner(); break;
    case 'cabinet': main.innerHTML=renderCabinet(); break;
    case 'editorial': main.innerHTML=renderEditorial(); break;
    case 'color': main.innerHTML=renderColor(); break;
    case 'academy': main.innerHTML=renderAcademy(); break;
  }
}

function showTab(tab){
  currentTab=tab;
  // Reset phase states on tab change
  if(tab==='skin'&&skinPhase==='scanning') skinPhase='idle';
  if(tab==='scanner'&&scannerPhase==='scanning') scannerPhase='idle';
  // Update nav active state
  document.querySelectorAll('.navBtn').forEach(btn=>{
    const isActive=btn.dataset.tab===tab;
    btn.style.color=isActive?'#7A6878':C.gray;
    btn.style.borderBottom=isActive?'2px solid #A899C0':'2px solid transparent';
    btn.style.fontWeight=isActive?'500':'400';
  });
  renderTab();
  window.scrollTo({top:0,behavior:'smooth'});
}

// ── INIT ──
renderTab();
</script>
</body>
</html>
