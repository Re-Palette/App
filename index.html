<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Acot — Beauty Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:#111;-webkit-tap-highlight-color:transparent;}
button{font-family:'DM Sans',sans-serif;cursor:pointer;}
#shell{width:100%;height:100%;position:relative;overflow:hidden;background:#F8F6F1;}
@media(min-width:600px){#shell{width:390px;height:844px;margin:0 auto;margin-top:max(0px,calc(50vh - 422px));}}
#shell-header{position:absolute;top:0;left:0;right:0;z-index:200;}
#shell-nav{position:fixed;bottom:0;left:0;right:0;z-index:300;} @media(min-width:600px){#shell-nav{position:absolute;}}
#scroll-area{position:absolute;top:52px;left:0;right:0;bottom:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(72px + env(safe-area-inset-bottom) + 16px);}
#scroll-area::-webkit-scrollbar{display:none;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scanLine{0%{top:8%}100%{top:88%}}
@keyframes floatDrop{0%,100%{transform:translateY(0);opacity:.5}50%{transform:translateY(-7px);opacity:.9}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes orb{0%,100%{transform:translate(0,0)}40%{transform:translate(20px,-14px)}70%{transform:translate(-10px,18px)}}
.lift{transition:transform .2s,box-shadow .2s;}
.lift:active{transform:scale(0.98)!important;}
.rowHov:active{background:#F2F0EB!important;}
</style>
</head>
<body>

<input type="file" id="cam-skin" accept="image/*" capture="user" style="display:none" onchange="handleSkinPhoto(this)">
<input type="file" id="cam-scanner" accept="image/*" capture="environment" style="display:none" onchange="handleScannerPhoto(this)">
<div id="shell">

  <!-- HEADER -->
  <div id="shell-header">
  <header style="height:52px;background:rgba(248,246,241,0.95);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-bottom:0.5px solid #E0DDD6;display:flex;align-items:center;justify-content:space-between;padding:0 16px;">
    <button onclick="showTab('home')" style="background:none;border:none;cursor:pointer;display:flex;flex-direction:column;line-height:1;align-items:flex-start;">
      <span style="font-family:'Cormorant Garamond',Georgia,serif;font-size:22px;font-weight:300;color:#7A6878;font-style:italic;letter-spacing:0.05em;">Acot</span>
      <span style="font-size:6px;letter-spacing:0.25em;color:#9BAA9B;margin-top:-2px;">BEAUTY INTELLIGENCE</span>
    </button>
    <button style="width:40px;height:40px;border-radius:50%;background:#C4B8D4;color:#7A6878;border:none;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:6px;letter-spacing:0.1em;gap:2px;">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      SAVE
    </button>
  </header>
  </div>

  <!-- SCROLL CONTENT -->
  <div id="scroll-area">
    <main id="main-content"></main>
  </div>


<!-- BOTTOM NAV -->
<div id="shell-nav"><nav id="bottom-nav" style="height:calc(72px + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);background:rgba(255,255,255,0.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:0.5px solid #E0DDD6;display:grid;grid-template-columns:repeat(7,1fr);">
  <button onclick="showTab('home')" class="navBtn" data-tab="home" style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:transparent;border:none;border-top:2px solid #A899C0;color:#7A6878;padding:0 2px;">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span style="font-size:7px;letter-spacing:0.04em;font-weight:500;">HOME</span>
  </button>
  <button onclick="showTab('skin')" class="navBtn" data-tab="skin" style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:transparent;border:none;border-top:2px solid transparent;color:#777770;padding:0 2px;">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M12 2a10 10 0 0 1 10 10c0 5.52-4.48 10-10 10S2 17.52 2 12 6.48 2 12 2z"/><path d="M6.3 15a6 6 0 1 0 11.4 0"/></svg>
    <span style="font-size:7px;letter-spacing:0.04em;">肌診断</span>
  </button>
  <button onclick="showTab('scanner')" class="navBtn" data-tab="scanner" style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:transparent;border:none;border-top:2px solid transparent;color:#777770;padding:0 2px;">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><line x1="7" y1="12" x2="17" y2="12"/></svg>
    <span style="font-size:7px;letter-spacing:0.04em;">成分解析</span>
  </button>
  <button onclick="showTab('cabinet')" class="navBtn" data-tab="cabinet" style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:transparent;border:none;border-top:2px solid transparent;color:#777770;padding:0 2px;">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/></svg>
    <span style="font-size:7px;letter-spacing:0.04em;">マイ棚</span>
  </button>
  <button onclick="showTab('editorial')" class="navBtn" data-tab="editorial" style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:transparent;border:none;border-top:2px solid transparent;color:#777770;padding:0 2px;">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
    <span style="font-size:7px;letter-spacing:0.04em;">情報誌</span>
  </button>
  <button onclick="showTab('color')" class="navBtn" data-tab="color" style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:transparent;border:none;border-top:2px solid transparent;color:#777770;padding:0 2px;">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></svg>
    <span style="font-size:7px;letter-spacing:0.04em;">カラー</span>
  </button>
  <button onclick="showTab('academy')" class="navBtn" data-tab="academy" style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:transparent;border:none;border-top:2px solid transparent;color:#777770;padding:0 2px;">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
    <span style="font-size:7px;letter-spacing:0.04em;">レッスン</span>
  </button>
</nav></div>
</div><!-- /shell -->

<script>
const C={bg:"#F8F6F1",white:"#FFFFFF",moss:"#6B7B6B",mossLight:"#A8BBA8",mossDark:"#8FAF8F",mossUltra:"#E4EBE4",charcoal:"#7A6878",gray:"#9A9490",grayLight:"#E0DDD6",grayUltra:"#F2F0EB",cream:"#F5F0E8",gold:"#D4B87A",goldLight:"#F5ECD0",rose:"#C49B9B",roseLight:"#F0E4E4",ink:"#F0ECF8"};
let currentTab='home',cabinet=[],skinPhase='idle',skinRes=null,skinCapturedImg=null,scannerPhase='idle',scannerProd=null,scannerSaved=false,scannerAct=null,scannerCapturedImg=null,colorPhase='idle',colorRes=null,academyCat='makeup',academyLv='beginner';

function pill(t,c=C.moss,b=C.mossUltra){return`<span style="display:inline-block;padding:3px 11px;border-radius:20px;background:${b};color:${c};font-size:8px;letter-spacing:0.15em;text-transform:uppercase;font-weight:500;">${t}</span>`;}
function waterDrops(n=12,op=0.1,light=false){let h='<div style="position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:0;">';for(let i=0;i<n;i++){const x=(i*41+13)%100,y=(i*57+9)%100,s=2+(i%5)*1.4,d=(i*0.38)%3.2,dur=3+(i%4);const col=light?`rgba(255,255,255,${op*2.2})`:`rgba(107,123,107,${op})`;const brd=light?`rgba(255,255,255,${op*3})`:`rgba(107,123,107,${op*1.4})`;h+=`<div style="position:absolute;left:${x}%;top:${y}%;width:${s}px;height:${s*1.35}px;border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;background:${col};border:0.5px solid ${brd};animation:floatDrop ${dur}s ease-in-out ${d}s infinite;"></div>`;}return h+'</div>';}
function orbs(c1=C.mossUltra,c2=C.goldLight,c3=C.roseLight){return`<div style="position:absolute;inset:0;overflow:hidden;pointer-events:none;"><div style="position:absolute;top:-20%;left:-10%;width:60%;height:60%;border-radius:50%;background:${c1};opacity:0.6;filter:blur(50px);animation:orb 13s ease-in-out infinite;"></div><div style="position:absolute;bottom:-15%;right:-8%;width:50%;height:50%;border-radius:50%;background:${c2};opacity:0.45;filter:blur(60px);animation:orb 17s ease-in-out 4s infinite;"></div><div style="position:absolute;top:38%;right:18%;width:35%;height:35%;border-radius:50%;background:${c3};opacity:0.35;filter:blur(40px);animation:orb 11s ease-in-out 2s infinite;"></div></div>`;}
function sectionHead(pt,title,pc=C.moss,pb='rgba(107,123,107,0.2)',bg=C.mossUltra){return`<div style="background:${bg};border-bottom:0.5px solid ${C.grayLight};padding:20px 16px 18px;position:relative;overflow:hidden;">${waterDrops(8,0.07)}<div style="position:relative;">${pill(pt,pc,pb)}<h2 style="font-family:'Cormorant Garamond',Georgia,serif;font-size:28px;font-weight:400;color:${C.charcoal};margin-top:8px;">${title}</h2></div></div>`;}
function chk(c,s=9){return`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`;}
function arr(s=13,c='#fff'){return`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>`;}

const FEAT=[
  {id:"skin",title:"肌診断",sub:"Skin Analysis",desc:"AIがあなたの肌状態をリアルタイム解析。水分・油分・キメ・赤みを数値化し、あなただけのスキンケアを提案します。",points:["水分・油分・キメを定量スコア化","赤みや敏感度の可視化","肌タイプ別ケアルーティン提案"],btn:"今すぐ診断",acc:C.moss,bg:C.mossUltra,icon:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M12 2a10 10 0 0 1 10 10c0 5.52-4.48 10-10 10S2 17.52 2 12 6.48 2 12 2z"/><path d="M6.3 15a6 6 0 1 0 11.4 0"/></svg>`},
  {id:"scanner",title:"成分解析",sub:"Cosme Scanner",desc:"コスメのラベルをスキャンするだけで全成分を即座に解析。注目成分の効能・注意点をわかりやすく解説します。",points:["500種以上の成分データベース","刺激成分・アレルゲンの自動検出","相性の良い成分の組み合わせ提案"],btn:"スキャンする",acc:C.gold,bg:C.goldLight,icon:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2V9M9 21H5a2 2 0 0 1-2-2V9m0 0h18"/></svg>`},
  {id:"cabinet",title:"マイドレッサー",sub:"My Cabinet",desc:"スキャンしたコスメをデジタルコレクションとして管理。使用期限・相性・重複成分を一覧で確認できます。",points:["コスメをまとめて一元管理","使用期限アラート","成分の重複・相性チェック"],btn:"棚を見る",acc:C.rose,bg:C.roseLight,icon:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>`},
  {id:"editorial",title:"美容情報誌",sub:"Editorial",desc:"皮膚科学を基盤にした信頼性の高い美容情報を、雑誌のようなリッチなレイアウトで。トレンドから基礎知識まで。",points:["科学的根拠に基づいた記事","最新トレンドをいち早くキャッチ","スキンケア・メイクの深掘り解説"],btn:"読んでみる",acc:C.mossDark,bg:C.cream,icon:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>`},
  {id:"color",title:"カラー診断",sub:"Color Palette",desc:"写真一枚で春夏秋冬4シーズンを自動判定。あなたのパーソナルカラーに合ったコスメカラーを提案します。",points:["4シーズン自動判定","似合うリップ・アイシャドウカラー一覧","NGカラーの理由も丁寧に解説"],btn:"診断を始める",acc:"#9B8CC4",bg:"#EDE8F5",icon:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></svg>`},
  {id:"academy",title:"レッスン動画",sub:"Academy",desc:"プロのメイクアップアーティストが監修した動画レッスン。初級から上級まで、あなたのレベルに合わせて学べます。",points:["メイク・ヘアをレベル別に選択","プロ監修の実践的テクニック","人気動画のランキング＆トレンド"],btn:"レッスンを見る",acc:"#C4866B",bg:"#F5EAE4",icon:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>`},
];

const MQ=["Skin Analysis","Cosme Scanner","My Cabinet","Editorial","Color Palette","Beauty Academy","Skin Analysis","Cosme Scanner","My Cabinet","Editorial","Color Palette","Beauty Academy"];

function renderHome(){
  const cards=FEAT.map((f,i)=>`
    <div class="lift" style="background:#fff;border:0.5px solid ${C.grayLight};border-radius:2px;cursor:pointer;position:relative;overflow:hidden;animation:fadeUp .6s ${i*0.06}s ease both;display:flex;flex-direction:column;">
      <div style="position:absolute;top:0;left:0;right:0;height:2px;background:${f.acc};"></div>
      <div style="padding:20px 18px 16px;flex:1;">
        <div style="display:flex;align-items:flex-start;gap:12px;margin-bottom:12px;">
          <div style="width:40px;height:40px;border-radius:50%;background:${f.bg};display:flex;align-items:center;justify-content:center;flex-shrink:0;color:${f.acc};">${f.icon}</div>
          <div><p style="font-family:'Cormorant Garamond',Georgia,serif;font-size:18px;font-weight:400;color:${C.charcoal};margin-bottom:1px;line-height:1.2;">${f.title}</p><p style="font-size:7px;letter-spacing:0.18em;text-transform:uppercase;color:${f.acc};">${f.sub}</p></div>
        </div>
        <p style="font-size:12px;color:${C.gray};line-height:1.8;margin-bottom:14px;font-weight:300;">${f.desc}</p>
        <div style="display:flex;flex-direction:column;gap:6px;">
          ${f.points.map(pt=>`<div style="display:flex;align-items:flex-start;gap:7px;"><div style="width:14px;height:14px;border-radius:50%;background:${f.bg};display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;">${chk(f.acc)}</div><span style="font-size:11px;color:${C.gray};line-height:1.5;font-weight:300;">${pt}</span></div>`).join('')}
        </div>
      </div>
      <div style="padding:14px 18px 18px;border-top:0.5px solid ${C.grayLight};">
        <button onclick="showTab('${f.id}')" style="width:100%;padding:11px 0;border-radius:2px;background:${f.acc};color:#fff;border:none;font-size:12px;letter-spacing:0.08em;display:flex;align-items:center;justify-content:center;gap:8px;">${f.btn} ${arr(13)}</button>
      </div>
    </div>`).join('');
  const mqi=MQ.map(t=>`<span style="font-size:8px;letter-spacing:0.28em;text-transform:uppercase;color:rgba(80,60,100,0.8);padding:0 22px;">${t} <span style="color:rgba(100,80,120,0.35);margin:0 5px;">◆</span></span>`).join('');
  return`<div style="background:${C.bg};">
    <section style="position:relative;min-height:72vh;display:flex;align-items:center;overflow:hidden;background:${C.ink};">
      ${orbs('#C8DECB','#EDE0C4','#E8E0F4')}${waterDrops(20,0.07,true)}
      <div style="position:relative;z-index:1;padding:48px 20px 52px;width:100%;animation:fadeUp .9s ease both;">
        ${pill('Beauty Intelligence Platform',C.mossLight,'rgba(107,123,107,0.18)')}
        <div style="margin-top:24px;">
          <h1 style="font-family:'Cormorant Garamond',Georgia,serif;font-size:46px;font-weight:400;color:#5A4E68;line-height:0.93;letter-spacing:-0.01em;">
            <em style="display:block;font-style:italic;color:${C.mossLight};font-size:0.52em;letter-spacing:0.03em;">Discover</em>
            Your Beauty<span style="display:block;color:${C.gold};font-style:italic;">Intelligence</span>
          </h1>
        </div>
        <p style="margin-top:22px;font-size:12px;color:rgba(90,78,104,0.65);line-height:1.9;font-weight:300;">AIが皮膚科学と美容の知識を統合。肌診断から成分解析まで、<br>あなた専用の美容知性を提供します。</p>
        <div style="margin-top:32px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
          <button onclick="showTab('skin')" style="display:flex;align-items:center;gap:8px;padding:11px 20px;border-radius:40px;background:${C.moss};color:#fff;border:none;font-size:12px;letter-spacing:0.05em;">今すぐ診断する ${arr(14)}</button>
          <button onclick="showTab('editorial')" style="display:flex;align-items:center;gap:6px;padding:11px 16px;border-radius:40px;background:transparent;color:rgba(90,78,104,0.7);border:0.5px solid rgba(163,184,163,0.35);font-size:12px;">美容情報を読む</button>

function renderTab(){
  const m=document.getElementById('main-content');
  switch(currentTab){case 'home':m.innerHTML=renderHome();break;case 'skin':m.innerHTML=renderSkin();break;case 'scanner':m.innerHTML=renderScanner();break;case 'cabinet':m.innerHTML=renderCabinet();break;case 'editorial':m.innerHTML=renderEditorial();break;case 'color':m.innerHTML=renderColor();break;case 'academy':m.innerHTML=renderAcademy();break;}
}
function showTab(tab){
  currentTab=tab;
  if(tab==='skin'&&skinPhase==='scanning')skinPhase='idle';
  if(tab==='scanner'&&scannerPhase==='scanning')scannerPhase='idle';
  document.querySelectorAll('.navBtn').forEach(btn=>{const a=btn.dataset.tab===tab;btn.style.color=a?'#7A6878':C.gray;btn.style.borderTop=a?'2px solid #A899C0':'2px solid transparent';btn.style.fontWeight=a?'500':'400';});
  renderTab();
  document.getElementById('scroll-area').scrollTo({top:0,behavior:'smooth'});
}
renderTab();

// ─── カメラ → base64変換 ───
function fileToBase64(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.split(',')[1]);
    r.onerror=rej;
    r.readAsDataURL(file);
  });
}

  skinPhase='scanning';
  skinCapturedImg=URL.createObjectURL(file);
  renderTab();

    const b64=await fileToBase64(file);

      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:file.type||'image/jpeg',data:b64}},
          {type:'text',text:`あなたは美容皮膚科の専門AIです。この顔写真を見て肌状態を診断してください。
必ず以下のJSON形式のみで回答してください（前後に文章不要）：
